version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: lms-app
    restart: unless-stopped
    volumes:
      - .:/var/www
      - /var/www/vendor
    networks:
      - lms-network
    depends_on:
      - db
      - redis
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-lms}
      - DB_USERNAME=${DB_USERNAME:-lms_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis

  webserver:
    image: nginx:alpine
    container_name: lms-webserver
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - lms-network
    depends_on:
      - app

  db:
    image: postgres:15-alpine
    container_name: lms-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-lms}
      POSTGRES_USER: ${DB_USERNAME:-lms_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - lms-network

  redis:
    image: redis:7-alpine
    container_name: lms-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    networks:
      - lms-network

networks:
  lms-network:
    driver: bridge

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
